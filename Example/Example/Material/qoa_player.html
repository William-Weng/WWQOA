<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QOA Player</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    .row { margin: 16px 0; }
    button { padding: 8px 14px; margin-right: 8px; }
    pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>QOA Player</h1>

  <div class="row">
    <input id="file" type="file" accept=".qoa,application/octet-stream">
  </div>

  <div class="row">
    <button id="play" disabled>Play</button>
    <button id="stop" disabled>Stop</button>
  </div>

  <pre id="log">Select a .qoa file…</pre>

  <script type="module">
    import { decode } from "https://esm.sh/qoa-format";

    const fileInput = document.getElementById("file");
    const playBtn = document.getElementById("play");
    const stopBtn = document.getElementById("stop");
    const log = document.getElementById("log");

    let audioContext = null;
    let audioBuffer = null;
    let sourceNode = null;
    let loadedFileName = "";

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new AudioContext();
      }
      return audioContext;
    }

    function stopPlayback() {
      if (sourceNode) {
        try { sourceNode.stop(); } catch {}
        sourceNode.disconnect();
        sourceNode = null;
      }
    }

    function setLog(text) {
      log.textContent = text;
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      stopPlayback();
      audioBuffer = null;
      loadedFileName = file.name;
      playBtn.disabled = true;
      stopBtn.disabled = true;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);

        const audio = decode(bytes);

        const ctx = ensureAudioContext();
        const buffer = ctx.createBuffer(
          audio.channels,
          audio.samples,
          audio.sampleRate
        );

        for (let ch = 0; ch < audio.channels; ch++) {
          buffer.copyToChannel(audio.channelData[ch], ch);
        }

        audioBuffer = buffer;
        playBtn.disabled = false;
        stopBtn.disabled = false;

        setLog(
`Loaded: ${loadedFileName}
sampleRate: ${audio.sampleRate}
channels: ${audio.channels}
samplesPerChannel: ${audio.samples}
duration: ${(audio.samples / audio.sampleRate).toFixed(3)} sec`
        );
      } catch (err) {
        setLog(`Decode failed:\n${err?.stack || err}`);
      }
    });

    playBtn.addEventListener("click", async () => {
      if (!audioBuffer) return;

      const ctx = ensureAudioContext();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }

      stopPlayback();

      sourceNode = ctx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(ctx.destination);
      sourceNode.start();

      sourceNode.onended = () => {
        if (sourceNode) {
          sourceNode.disconnect();
          sourceNode = null;
        }
      };
    });

    stopBtn.addEventListener("click", () => {
      stopPlayback();
    });
  </script>
</body>
</html>
